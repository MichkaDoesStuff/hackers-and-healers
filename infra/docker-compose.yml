services:
  hapi:
    image: hapiproject/hapi:latest
    container_name: loop-hapi
    ports:
      - "8080:8080"
    environment:
      # FHIR R4, default in-memory H2 DB (fine for the hackathon).
      hapi.fhir.fhir_version: R4
      # Allow large transaction bundles from Synthea.
      hapi.fhir.max_page_size: "200"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/fhir/metadata"]
      interval: 15s
      timeout: 5s
      retries: 20
